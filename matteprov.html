<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#10101C;--bg3:#18182A;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#EEEAF0;--muted:rgba(238,234,240,0.42);
  --accent:#FF6B35;--teal:#4ECDC4;--yellow:#FFE066;--green:#56C270;--red:#E05252;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%,100%{opacity:.35}50%{opacity:.8}}
.fade-up{animation:fadeUp .38s cubic-bezier(.22,1,.36,1) both}
.nav{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;
  border-bottom:1px solid var(--border);background:rgba(8,8,16,.92);
  backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.logo{font-family:'Fraunces',serif;font-size:1.18rem;font-weight:900;letter-spacing:-.02em}
.logo span{color:var(--accent)}
.nav-right{display:flex;gap:7px;align-items:center}
.nav-stat{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);
  background:var(--bg3);border:1px solid var(--border);padding:4px 11px;border-radius:20px}
.nav-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 13px;
  border-radius:8px;cursor:pointer;font-size:.76rem;transition:all .2s;font-family:'DM Sans',sans-serif}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.08)}
.screen{display:none}.screen.active{display:block}
.home{max-width:820px;margin:0 auto;padding:44px 20px 100px}
.hero{text-align:center;margin-bottom:44px}
.eyebrow{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);
  border:1px solid var(--border);padding:5px 14px;border-radius:20px;font-size:.68rem;
  color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:18px;
  letter-spacing:.07em;text-transform:uppercase}
h1{font-family:'Fraunces',serif;font-size:clamp(2rem,5.5vw,3.2rem);
  font-weight:900;line-height:1.06;letter-spacing:-.035em;margin-bottom:13px}
h1 em{font-style:italic;color:var(--accent)}
.hero p{color:var(--muted);font-size:.94rem;max-width:460px;margin:0 auto;line-height:1.65}
.sec-label{font-family:'Fraunces',serif;font-size:.88rem;font-weight:600;color:var(--muted);margin-bottom:10px}
.sec-label strong{color:var(--text)}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:28px}
.topic-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:13px;
  padding:14px 13px;cursor:pointer;transition:all .2s;text-align:center;user-select:none;position:relative}
.topic-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.topic-card.sel{border-color:var(--tc)!important;background:rgba(var(--tc-rgb),.08)}
.topic-card.dim{opacity:.3;pointer-events:none}
.topic-icon{font-size:1.5rem;display:block;margin-bottom:6px}
.topic-name{font-size:.8rem;font-weight:600;line-height:1.3}
.topic-count{font-size:.66rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px}
.topic-check{position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:50%;
  background:var(--tc);display:flex;align-items:center;justify-content:center;
  font-size:.52rem;color:#fff;opacity:0;transition:all .2s;transform:scale(.5)}
.topic-card.sel .topic-check{opacity:1;transform:scale(1)}
.level-row{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.level-card{flex:1;min-width:88px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:13px;padding:13px 11px;cursor:pointer;transition:all .2s;text-align:center;user-select:none}
.level-card:hover{border-color:var(--border2)}
.level-card.sel{border-color:var(--lc);background:rgba(var(--lc-rgb),.07)}
.level-card.dim{opacity:.3;pointer-events:none}
.level-letter{font-family:'Fraunces',serif;font-size:1.75rem;font-weight:900;display:block}
.level-name{font-size:.73rem;font-weight:600;margin-bottom:2px}
.level-desc{font-size:.66rem;color:var(--muted)}
.level-count{font-size:.63rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px}
.start-btn{width:100%;padding:15px;border-radius:13px;border:none;background:var(--accent);
  color:#fff;font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;
  cursor:pointer;letter-spacing:-.01em;transition:all .25s}
.start-btn:hover:not(:disabled){background:#FF8150;transform:translateY(-2px);
  box-shadow:0 10px 26px rgba(255,107,53,.35)}
.start-btn:disabled{opacity:.3;cursor:not-allowed}
.practice{max-width:800px;margin:0 auto;padding:26px 20px 100px}
.p-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:3px 11px;border-radius:20px;font-size:.67rem;font-family:'DM Mono',monospace;
  border:1px solid var(--border);background:var(--bg3);text-transform:uppercase;letter-spacing:.05em}
.badge.acc{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.08)}
.badge.lv-E{border-color:var(--green);color:var(--green)}
.badge.lv-C{border-color:var(--yellow);color:var(--yellow)}
.badge.lv-A{border-color:var(--red);color:var(--red)}
.q-counter{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
.prog-track{height:3px;background:var(--bg3);margin-bottom:18px;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:2px;transition:width .5s}
.q-banner{border-radius:12px;padding:14px 18px;margin-bottom:13px;
  border:2px solid var(--accent);background:rgba(255,107,53,.07)}
.q-banner-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:5px}
.q-banner-main{font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:4px}
.q-banner-sub{padding:9px 13px;background:rgba(255,107,53,.1);border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;font-size:.88rem;line-height:1.65;margin-bottom:6px}
.q-banner-meta{font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace}
.page-wrap{border-radius:14px;overflow:hidden;margin-bottom:13px;
  border:2px solid var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.page-wrap img{width:100%;display:block}
.page-wrap-text{background:#fff;border-radius:14px;padding:22px 26px;
  font-size:.87rem;line-height:1.78;white-space:pre-wrap;color:#111;
  border:2px solid var(--border2);margin-bottom:13px}
.ans-wrap{margin-bottom:10px}
textarea.ans-input{width:100%;padding:12px 14px;background:var(--bg2);
  border:1.5px solid var(--border);border-radius:12px;color:var(--text);
  font-size:.9rem;font-family:'DM Mono',monospace;outline:none;
  transition:border-color .2s;resize:vertical;min-height:50px;line-height:1.5}
textarea.ans-input:focus{border-color:var(--accent)}
textarea.ans-input:disabled{opacity:.5}
.act-row{display:flex;gap:7px;margin-bottom:9px}
.btn-check{flex:1;padding:12px;border:none;border-radius:12px;background:var(--accent);
  color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.87rem;
  cursor:pointer;transition:all .2s}
.btn-check:hover:not(:disabled){background:#FF8150}
.btn-check:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{padding:12px 11px;border:1px solid var(--border);border-radius:12px;
  background:none;color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:.75rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-sm:hover{border-color:var(--teal);color:var(--teal)}
.hint-box{background:var(--bg3);border:1px solid rgba(255,224,102,.18);
  border-radius:11px;padding:12px 14px;margin-bottom:9px;font-size:.82rem;line-height:1.65}
.hint-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--yellow);margin-bottom:5px;font-family:'DM Mono',monospace}
.fb{border-radius:13px;padding:17px;margin-top:12px;border:1px solid}
.fb.ok{background:rgba(86,194,112,.07);border-color:rgba(86,194,112,.22)}
.fb.bad{background:rgba(224,82,82,.07);border-color:rgba(224,82,82,.22)}
.fb-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.fb-icon{font-size:1.1rem}.fb-title{font-weight:700;font-size:.88rem}
.fb-short{font-size:.82rem;color:var(--muted);line-height:1.65;margin-bottom:10px}
.sol-box{background:var(--bg3);border-radius:9px;padding:12px;font-size:.81rem;line-height:1.72;margin-bottom:10px}
.sol-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;font-family:'DM Mono',monospace}
.tip{font-size:.75rem;color:var(--teal);font-family:'DM Mono',monospace;border-left:2px solid var(--teal);padding-left:9px}
.next-btn{width:100%;padding:12px;margin-top:11px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#D44000);color:#fff;
  font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .25s}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(255,107,53,.3)}
.ses{margin-top:26px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.score-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.score-num{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:900;display:block}
.score-lbl{font-size:.67rem;color:var(--muted);margin-top:4px}
.hist{max-width:700px;margin:0 auto;padding:28px 20px 100px}
.hist h2{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;letter-spacing:-.04em;margin-bottom:5px}
.hist .sub{color:var(--muted);font-size:.83rem;margin-bottom:18px}
.hist-list{display:flex;flex-direction:column;gap:7px;margin-top:14px}
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:11px;
  padding:10px 14px;display:flex;align-items:center;gap:10px}
.h-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.h-q{font-size:.79rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.h-meta{font-size:.67rem;color:var(--muted);margin-top:1px}
.h-result{font-family:'DM Mono',monospace;font-size:.74rem;flex-shrink:0}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
  display:inline-block;vertical-align:middle;margin-right:5px}
.skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
.empty{text-align:center;padding:50px 0;color:var(--muted)}
.e-icon{font-size:2.2rem;margin-bottom:10px}
@media(max-width:560px){.topic-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

  </div>
</div>
</div>

<div class="screen" id="screenHistory">

  </div>
  <div class="hist-list" id="histList"></div>
</div>
</div>

 27, "y": "2013", "d": "D", "p": 7, "n": "25a", "sub": "a", "l": "E", "t": "statistik", "pts": "(1/0/0)", "main": "25. Sydafrika består av 9 provinser. I tabellen ser du folkmängd och area för varje provins. Folkmängd och area för Sydafrikas provinser och för Sverige. Provinser Folkmängd (miljoner) Area (1 000 km2) Eastern Cape 6,6 169 Free State 2,8 129 Gauteng 10,5 17 KwaZulu-Natal 10,3 92 Limpopo 5,2 123 Mpumalanga 3,7 79 North West 3,3 116 Northern Cape 1,1", "sub_txt": "Kevin och Veronica diskuterar vilken provins som är störst. Kevin påstår att det är Gauteng medan Veronica anser att det är Northern Cape. Hur tolkar de tabellen när de ger så olika svar? (1/0/0)", "img": "2013_D_p7.jpg", "img2": null, "ak": "25. a) Kevin syftar på folkmängden medan Veronica \nsyftar på arean\nGodtagbar motivering.\n(1/0/0)\n+ER\nb) Diagram 2\nKorrekt svar med någon motivering, t.ex. diagram 2, \neftersom stapel A (10,5) och B (10,3) är nästan lika \nhöga.\n(2/0/0)\n+EP+ER\nc) Svar i intervallet 275–280 miljoner med lämpligt \nantal värdesiffror\nPåbörjad lösning, t.ex. beräknar/tecknar kvoten för \nfolktätheten i Gauteng.\nLösningen"}, {"id": 28, "y": "2013", "d": "D", "p": 7, "n": "25b", "sub": "b", "l": "E", "t": "statistik", "pts": "(2/0/0)", "main": "25. Sydafrika består av 9 provinser. I tabellen ser du folkmängd och area för varje provins. Folkmängd och area för Sydafrikas provinser och för Sverige. Provinser Folkmängd (miljoner) Area (1 000 km2) Eastern Cape 6,6 169 Free State 2,8 129 Gauteng 10,5 17 KwaZulu-Natal 10,3 92 Limpopo 5,2 123 Mpumalanga 3,7 79 North West 3,3 116 Northern Cape 1,1", "sub_txt": "Nedan visas tre olika förslag på diagram över provinsernas folkmängd. Vilket diagram visar de tre provinser som har störst folkmängd? Motivera ditt svar. (2/0/0)", "img": "2013_D_p7.jpg", "img2": null, "ak": "b) Diagram 2\nKorrekt svar med någon motivering, t.ex. diagram 2, \neftersom stapel A (10,5) och B (10,3) är nästan lika \nhöga.\n(2/0/0)\n+EP+ER"}, {"id": 29, "y" const LEVELS=[

let selTopic=null,selLevel=null;
let session={correct:0,total:0};
let history=[];
let loading=false;
let usedIds=new Set();
let curQ=null;
let siblingQueue=[];

function getSiblings(q){
  const baseN=q.n.replace(/[abc]$/,'');
  return QS.filter(s=>s.y===q.y&&s.d===q.d&&s.n.replace(/[abc]$/,'')===baseN&&s.sub!=='')
           .sort((a,b)=>a.sub<b.sub?-1:1);
}

function countQs(t,l){return QS.filter(q=>q.t===t&&q.l===l).length;}

function initHome(){
  document.getElementById('topicGrid').innerHTML=TOPICS.map(t=>`
    <div class="topic-card${QS.filter(q=>q.t===t.id).length===0?' dim':''}" id="tc-${t.id}"
         onclick="selectTopic('${t.id}')" style="--tc:${t.color};--tc-rgb:${t.rgb}">
      <span class="topic-icon">${t.icon}</span>
      <div class="topic-name">${t.label}</div>
      <div class="topic-count">${QS.filter(q=>q.t===t.id).length} uppgifter</div>
      <div class="topic-check">✓</div>
    </div>`).join('');
  renderLevels();
}
initHome();

function renderLevels(){
  document.getElementById('levelRow').innerHTML=LEVELS.map(l=>{
    const n=selTopic?countQs(selTopic,l.id):QS.filter(q=>q.l===l.id).length;
    return `<div class="level-card${n===0?' dim':''}" id="lc-${l.id}"
      onclick="selectLevel('${l.id}')" style="--lc:${l.color};--lc-rgb:${l.rgb}">
      <span class="level-letter" style="color:${l.color}">${l.id}</span>
      <div class="level-name">${l.name}</div>
      <div class="level-desc">${l.desc}</div>
      <div class="level-count">${n} uppg${selTopic?' i valt ämne':''}</div>
    </div>`;
  }).join('');
  if(selLevel) document.getElementById('lc-'+selLevel)?.classList.add('sel');
}

function selectTopic(id){
  selTopic=id;selLevel=null;
  document.querySelectorAll('.topic-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('tc-'+id)?.classList.add('sel');
  renderLevels();checkStart();
}
function selectLevel(id){
  selLevel=id;
  document.querySelectorAll('.level-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('lc-'+id)?.classList.add('sel');
  checkStart();
}
function checkStart(){
  document.getElementById('startBtn').disabled=!(selTopic&&selLevel&&countQs(selTopic,selLevel)>0);
}

function showScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen'+n).classList.add('active');
  document.getElementById('btnHome').classList.toggle('active',n==='Home');
  document.getElementById('btnHist').classList.toggle('active',n==='History');
}
function goHome(){showScreen('Home');}
function goHistory(){renderHistory();showScreen('History');}

function pickFresh(){
  let pool=QS.filter(q=>q.t===selTopic&&q.l===selLevel&&!usedIds.has(q.id));
  if(pool.length===0){
    usedIds.clear();
    if(curQ) usedIds.add(curQ.id);
    pool=QS.filter(q=>q.t===selTopic&&q.l===selLevel&&!usedIds.has(q.id));
  }
  if(pool.length===0) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}

function startPractice(){
  session={correct:0,total:0};usedIds.clear();siblingQueue=[];
  document.getElementById('sesStats').style.display='none';
  const tp=TOPICS.find(t=>t.id===selTopic),lv=LEVELS.find(l=>l.id===selLevel);
  document.getElementById('badgeRow').innerHTML=
    '<span class="badge acc">'+tp.label+'</span>'
    +'<span class="badge lv-'+selLevel+'">'+lv.name+'</span>';
  showScreen('Practice');
  loadQ();
}

function loadQ(){
  loading=false;
  let q;
  if(siblingQueue.length>0){
    q=siblingQueue.shift();
  } else {
    q=pickFresh();
    if(!q){showError('Inga fler uppgifter – bra jobbat!');return;}
    if(q.sub!==''){
      const allSibs=getSiblings(q);
      siblingQueue.push(...allSibs.filter(s=>s.sub>q.sub));
    } else {
      const subs=getSiblings(q);
      if(subs.length>0){
        siblingQueue.push(...subs);
        q=siblingQueue.shift();
      }
    }
    if(q.sub!==''&&siblingQueue.length===0){
      const allSibs=getSiblings(q);
      siblingQueue.push(...allSibs.filter(s=>s.sub>q.sub));
    }
  }
  usedIds.add(q.id);
  curQ=q;
  session.total++;
  document.getElementById('qCounter').textContent='#'+session.total;
  updateProg();
  renderQ(q);
}

function renderQ(q){
  const area=document.getElementById('practiceArea');
  const tpName=(TOPICS.find(t=>t.id===q.t)||{}).label||q.t;
  let siblingHint='';
  if(siblingQueue.length>0){
    const baseN=q.n.replace(/[abc]$/,'');
    const coming=siblingQueue.filter(s=>s.n.replace(/[abc]$/,'')===baseN).map(s=>baseN+s.sub);
    if(coming.length>0) siblingHint=' · fortsätter med '+coming.join(', ');
  }
  let instrMain,instrSub='';
  if(q.sub){
    instrMain='Svara på uppgift <strong>'+q.n+'</strong>&nbsp;(delfråga&nbsp;'+q.sub+')';
    if(q.sub_txt&&q.sub_txt.trim())
      instrSub='<div class="q-banner-sub">'+esc(q.sub_txt)+'</div>';
  } else {
    instrMain='Svara på uppgift <strong>'+q.n+'</strong>';
  }
  const banner='<div class="q-banner">'
    +'<div class="q-banner-label">Din uppgift</div>'
    +'<div class="q-banner-main">'+instrMain+'</div>'
    +instrSub
    +'<div class="q-banner-meta">NP '+q.y+' · Delprov '+q.d+' · '+tpName+(q.pts?' · '+q.pts:'')+siblingHint+'</div>'
    +'</div>';

  // KEY CHANGE: load image from images/ folder, not base64
  let pageHtml;
  if(q.img){
    pageHtml='<div class="page-wrap"><img src="images/'+q.img+'" alt="Provsida" loading="lazy"></div>';
  } else {
    pageHtml='<div class="page-wrap-text">'+esc(q.main)+'</div>';
  }

  area.innerHTML=banner+pageHtml
    +'<div class="ans-wrap"><textarea class="ans-input" id="ansInput"'
    +' placeholder="Ditt svar på uppgift '+q.n+'…" rows="2"'
    +' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();checkAns();}"></textarea></div>'
    +'<div class="act-row">'
    +'<button class="btn-check" id="btnCheck" onclick="checkAns()">Kontrollera svar</button>'
    +'<button class="btn-sm" onclick="getHint()">💡 Ledtråd</button>'
    +'<button class="btn-sm" onclick="skipQ()">Hoppa över</button>'
    +'</div><div id="hintArea"></div><div id="fbArea"></div>';
  document.getElementById('ansInput')?.focus();
}

function skipQ(){
  if(curQ&&curQ.sub){
    const baseN=curQ.n.replace(/[abc]$/,'');
    siblingQueue=siblingQueue.filter(s=>s.n.replace(/[abc]$/,'')!==baseN);
  }
  loadQ();
}

async function checkAns(){
  const inp=document.getElementById('ansInput');
  const ans=(inp?.value||'').trim();
  if(!ans||loading) return;
  loading=true;
  const btn=document.getElementById('btnCheck');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Bedömer…';
  const sys='Du är en rättvis matematiklärare som bedömer svar på NP åk 9 ('+curQ.y+', Delprov '+curQ.d+').'
    +' Svara ALLTID med JSON och inget annat.';
  const subInfo=curQ.sub
    ?'\n\nDelfråga '+curQ.sub+(curQ.sub_txt?' ('+curQ.sub_txt+')':'')+'.'
    :'\n\nUppgift '+curQ.n+'.';
  const akInfo=curQ.ak
    ?'\n\nBedömningsanvisning:\n'+curQ.ak
     +'\n\nVIKTIGT: Basera din bedömning ENBART på bedömningsanvisningen.'
    :'';
  try{
    let messages;
    if(curQ.img){
      // Fetch image and send as base64 for vision API
      const imgResp = await fetch('images/'+curQ.img);
      const blob = await imgResp.blob();
      const b64 = await new Promise(res=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.readAsDataURL(blob);
      });
      messages=[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:'Provsida NP '+curQ.y+' Delprov '+curQ.d+'.'+subInfo+akInfo
          +'\nElevens svar: '+ans
          +'\nJSON: {"correct":true/false,"shortFeedback":"1-2 meningar",'
          +'"explanation":"steg-for-steg","correctAnswer":"facit","tipForNext":"tips"}'}
      ]}];
    } else {
      messages=[{role:'user',content:
        'Uppgift: '+curQ.main+(curQ.sub?' Delfråga '+curQ.sub+': '+curQ.sub_txt:'')
        +akInfo+'\nSvar: '+ans
        +'\nJSON: {"correct":true/false,"shortFeedback":"1-2 meningar",'
        +'"explanation":"steg-for-steg","correctAnswer":"facit","tipForNext":"tips"}'
      }];
    }
    const raw=await callClaude(messages,sys);
    const fb=parseJSON(raw);
    const ok=fb.correct===true;
    if(ok) session.correct++;
    history.unshift({label:'Uppgift '+curQ.n+' — NP '+curQ.y+' Delprov '+curQ.d,
      topic:(TOPICS.find(t=>t.id===curQ.t)||{}).label||curQ.t,level:curQ.l,answer:ans,correct:ok});
    inp.disabled=true;
    document.getElementById('fbArea').innerHTML=
      '<div class="fb '+(ok?'ok':'bad')+'">'
      +'<div class="fb-head"><span class="fb-icon">'+(ok?'✅':'❌')+'</span>'
      +'<span class="fb-title">'+(ok?'Rätt!':'Inte riktigt')+'</span></div>'
      +'<div class="fb-short">'+esc(fb.shortFeedback||'')+'</div>'
      +(fb.explanation?'<div class="sol-box"><div class="sol-lbl">Lösning</div>'+esc(fb.explanation)+'</div>':'')
      +(!ok&&fb.correctAnswer?'<div class="tip">Rätt svar: '+esc(fb.correctAnswer)+'</div>':'')
      +(fb.tipForNext?'<div class="tip" style="margin-top:7px">'+esc(fb.tipForNext)+'</div>':'')
      +'<button class="next-btn" onclick="loadQ()">Nästa uppgift →</button></div>';
    updateProg();if(session.total>=3)showSes();
  }catch(e){
    document.getElementById('fbArea').innerHTML=
      '<div class="fb bad"><div class="fb-short">⚠️ '+esc(e.message)+'</div>'
      +'<button class="next-btn" onclick="loadQ()">Försök igen</button></div>';
  }finally{loading=false;}
}

async function getHint(){
  if(loading)return;
  const ha=document.getElementById('hintArea');
  ha.innerHTML='<div class="hint-box"><div class="hint-lbl">💡 Ledtråd</div>'
    +'<div class="skel" style="height:13px;width:65%;margin-top:4px"></div></div>';
  loading=true;
  const subInfo=curQ.sub?' Delfråga '+curQ.sub+(curQ.sub_txt?': '+curQ.sub_txt:''):'';
  try{
    let messages;
    if(curQ.img){
      const imgResp=await fetch('images/'+curQ.img);
      const blob=await imgResp.blob();
      const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.readAsDataURL(blob);});
      messages=[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:'Ge en kort ledtråd (max 2 meningar) för uppgift '+curQ.n+subInfo+'. Avslöj INTE svaret.'}
      ]}];
    } else {
      messages=[{role:'user',content:'Uppgift: '+curQ.main+subInfo+'\nLedtråd, max 2 meningar, avslöj ej svar.'}];
    }
    const h=await callClaude(messages,'Du är en hjälpsam matematiklärare. Svara på svenska, max 2 meningar.');
    ha.innerHTML='<div class="hint-box"><div class="hint-lbl">💡 Ledtråd</div>'+esc(h)+'</div>';
  }catch(e){ha.innerHTML='';}
  finally{loading=false;}
}

function updateProg(){
  const pct=session.total>0?Math.min((session.correct/session.total)*100,100):0;
  document.getElementById('progFill').style.width=pct+'%';
  const ns=document.getElementById('navStat');
  if(session.total>0){ns.style.display='inline';ns.textContent=session.correct+'/'+session.total;}
}
function showSes(){
  document.getElementById('sesStats').style.display='block';
  document.getElementById('sTotal').textContent=session.total;
  document.getElementById('sCorrect').textContent=session.correct;
  document.getElementById('sPct').textContent=Math.round((session.correct/session.total)*100)+'%';
}
function showError(msg){
  document.getElementById('practiceArea').innerHTML=
    '<div class="fb bad" style="margin-top:0"><div class="fb-short">⚠️ '+esc(msg)+'</div>'
    +'<button class="next-btn" onclick="goHome()">Välj nytt ämne</button></div>';
}
async function callClaude(messages,sys){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':getKey(),
      'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:700,system:sys,messages})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'API-fel '+res.status);}
  return(await res.json()).content?.[0]?.text||'';
}
function parseJSON(raw){return JSON.parse(raw.replace(/```json|```/g,'').trim());}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderHistory(){
  const list=document.getElementById('histList'),sub=document.getElementById('histSub'),hs=document.getElementById('histStats');
  sub.textContent='Dina senaste '+history.length+' uppgifter';
  if(!history.length){list.innerHTML='<div class="empty"><div class="e-icon">📚</div><div>Ingen historik än.</div></div>';hs.style.display='none';return;}
  const correct=history.filter(h=>h.correct).length;
  hs.style.display='block';
  document.getElementById('hTotal').textContent=history.length;
  document.getElementById('hCorrect').textContent=correct;
  document.getElementById('hPct').textContent=Math.round((correct/history.length)*100)+'%';
  list.innerHTML=history.map(h=>
    '<div class="hist-item"><div class="h-dot" style="background:'+(h.correct?'var(--green)':'var(--red)')+'"></div>'
    +'<div style="flex:1;overflow:hidden"><div class="h-q">'+esc(h.label)+'</div>'
    +'<div class="h-meta">'+esc(h.topic)+' · Nivå '+esc(h.level)+'</div></div>'
    +'<div class="h-result" style="color:'+(h.correct?'var(--green)':'var(--red)')+'">'+
    (h.correct?'✓':'✗')+'</div></div>'
  ).join('');
}
</script>
